<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منيو حلواني أبناء الفايدي</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
        .top-bar { background: #800000; color: white; padding: 15px 10px; text-align: center; border-bottom: 3px solid #D4AF37; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .top-bar h2 { margin: 0 0 10px 0; font-size: 20px; font-weight: 900; color: #EEDC82; }
        .search-box { width: 90%; max-width: 400px; padding: 8px 15px; border-radius: 20px; border: 1px solid #D4AF37; margin: 0 auto 10px auto; display: block; text-align: center; font-family: 'Cairo'; font-weight: bold; outline: none; }
        .filter-container { display: flex; overflow-x: auto; gap: 8px; padding: 5px; justify-content: center; flex-wrap: wrap; }
        .filter-btn { background: #5a0000; color: white; border: 1px solid #D4AF37; padding: 4px 12px; border-radius: 15px; cursor: pointer; font-family: 'Cairo'; font-size: 12px; font-weight: bold; transition: 0.3s; white-space: nowrap; }
        .filter-btn.active { background: #EEDC82; color: #800000; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; padding: 15px; max-width: 1200px; margin: 0 auto; }
        .card { background: white; border-radius: 12px; padding: 10px; text-align: center; border-bottom: 4px solid #800000; box-shadow: 0 3px 6px rgba(0,0,0,0.1); display: flex; flex-direction: column; position: relative; }
        .code-tag { background: #333; color: white; font-size: 11px; padding: 3px 8px; border-radius: 4px; display: inline-block; margin: 0 auto 8px auto; font-weight: bold; }
        .card img { width: 100%; height: 140px; object-fit: contain; border-radius: 8px; background: #f9f9f9; margin-bottom: 10px; border: 1px dashed #ddd; }
        .card-title { color: #800000; font-size: 15px; font-weight: 900; margin: 0 0 5px 0; }
        .card-price { color: #d49500; font-size: 16px; font-weight: bold; margin-bottom: 10px; }
        .order-btn { background: #28a745; color: white; border: 1px solid #218838; padding: 8px; border-radius: 8px; width: 100%; font-family: 'Cairo'; font-weight: bold; cursor: pointer; margin-top: auto; transition: 0.2s; }
        .order-btn:hover { background: #218838; transform: translateY(-2px); }
        
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 12px; width: 85%; max-width: 320px; text-align: center; border: 3px solid #D4AF37; }
        .modal-content select { width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 8px; font-family: 'Cairo'; border: 1px solid #D4AF37; outline: none; font-weight: bold; color: #800000; text-align: center;}
        .btn-wa { background: #25D366; color: white; border: 1px solid #1da851; padding: 10px; border-radius: 8px; width: 100%; font-family: 'Cairo'; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .btn-close { background: #dc3545; color: white; border: none; padding: 8px; border-radius: 8px; width: 100%; font-family: 'Cairo'; font-weight: bold; cursor: pointer; }
        
        @media (min-width: 601px) { .grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); } .card img { height: 180px; } }
    </style>
</head>
<body>
    <div class="top-bar">
        <h2>حلواني أبناء الفايدي 1989</h2>
        <input type="text" id="searchInput" class="search-box" placeholder="ابحث بالاسم أو الرقم..." oninput="filterItems()">
        <div class="filter-container" id="filterContainer">
            ${filterButtonsHTML}
        </div>
    </div>

    <div class="grid" id="itemsGrid">
        ${cardsHTML}
    </div>

    <div id="modal">
        <div class="modal-content">
            <h3 style="color:#800000; margin-top:0;">تأكيد الطلب</h3>
            <p id="modalDesc" style="font-size:13px; font-weight:bold; color:#555;"></p>
            <select id="branchSelect">
                ${branchesSelectHTML}
            </select>
            <button class="btn-wa" onclick="sendWA()">💬 إرسال عبر واتساب</button>
            <button class="btn-close" onclick="closeModal()">إغلاق</button>
        </div>
    </div>

    <script>
        let currentCat = 'all';
        let cName = '', cCode = '', cPrice = '', cLink = '';

        function filterByCat(cat, btnEl) {
            currentCat = cat;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btnEl.classList.add('active');
            filterItems();
        }

        function filterItems() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const cards = document.querySelectorAll('.card');
            cards.forEach(card => {
                const name = card.dataset.name;
                const code = card.dataset.code;
                const cat = card.dataset.category;
                const matchesSearch = name.includes(query) || code.includes(query);
                const matchesCat = currentCat === 'all' || cat === currentCat;
                if (matchesSearch && matchesCat) {
                    card.style.display = 'flex';
                } else {
                    card.style.display = 'none';
                }
            });
        }

        function openModal(n, c, p, l) {
            cName = n; cCode = c; cPrice = p; cLink = l;
            document.getElementById('modalDesc').innerText = "الصنف: " + n + " | السعر: " + p + " د.ل";
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        function sendWA() {
            const phone = document.getElementById('branchSelect').value;
            let msg = "مرحباً حلواني أبناء الفايدي، أود طلب الصنف: *" + cName + "*\\nرقم الصنف: " + cCode + " | السعر: " + cPrice + " د.ل\\n";
            if(cLink) msg += "-----------------------------------\\n❖ [ 📸 رابط الصورة المعتمدة في النظام ]:\\n" + cLink;
            window.open("https://wa.me/" + phone + "?text=" + encodeURIComponent(msg), "_blank");
            closeModal();
        }
    </script>
</body>
</html>
