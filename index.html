<body class="admin-locked">

            <button class="btn-call" onclick="makeCall()">📞 اتصال مباشر</button>
            <button class="btn-close-modal" onclick="closeContactModal()">إغلاق النافذة</button>

            </div>
        </div>
        
        <div class="header-content-section">

    </div>

        <div id="filter-tags"><button class="filter-btn active" onclick="filterByCat('all', this)">الكل</button></div>

            <button class="issue-btn" onclick="filterByIssue('no-img', this)">بدون صورة</button>
            <button class="issue-btn" onclick="filterByIssue('no-name', this)">بدون اسم</button>
            <button class="issue-btn" onclick="filterByIssue('no-link', this)">بدون رابط</button>
            <button class="issue-btn" id="btn-all-issues" onclick="filterByIssue('all-issues', this)">⚠️ النواقص</button>
        </div>

            <div class="admin-management-blocks">
                <div class="control-panel">
                    <b>الأقسام:</b>

                    <input type="text" id="newCatInput" placeholder="قسم جديد...">

                </div>

                    <input type="text" id="bNameInp" placeholder="الاسم...">

                    <button class="btn-panel-save" onclick="addNewBranch()" style="background:#28a745">➕</button>
                </div>
                
                <div class="branch-panel" style="background:#4A0000; border-color:#D4AF37;">
                    <b>صورة الفروع:</b>
                    <label style="cursor:pointer; background:#D4AF37; color:#800000; padding:2px 5px; border-radius:4px; font-size:10px; font-weight:bold; margin-right:4px;">

                        <input type="file" style="display:none" accept="image/*" onchange="uploadBranchesUnifiedImage(this)">
                    </label>
                    <img id="branchesUnifiedImgPreview" src="" style="height:20px; width:20px; border-radius:4px; object-fit:cover; display:none; margin-right:4px; border: 1px solid #D4AF37;">

                <input type="file" id="import-json-upload" accept=".json" style="display:none" onchange="importLocalJSON(this)">

                <button class="btn-admin" onclick="addNewItemWithCategory()">➕ صنف جديد</button>
                
                <button class="btn-zip" onclick="exportAllImagesFlat()" style="background:#d35400;">📦 كل الصور</button>
                <button class="btn-zip" onclick="exportAllImages()" style="background:#ff9800;">📂 صور مقسمة</button>
                <button class="btn-speedly" onclick="exportExcelWithLocalImages()" style="background:#157347; border: 1px solid #D4AF37;">📊 إكسل متكامل</button>
                <button class="btn-word" onclick="exportWordWithLocalImages()">📝 وورد متكامل</button>
                <button class="btn-pdf" onclick="exportToPDF()">📄 طباعة PDF</button>
                <button class="btn-speedly" onclick="exportDataToSpeedlyXLSX()">📥 إكسل سبيدلي</button>
                <button class="btn-export-html" onclick="exportStandaloneMenu()">📱 تصدير منيو للزبائن (HTML)</button>
            </div>

        firebase.initializeApp(firebaseConfig);
        const dbCloud = firebase.database();

        let dbOffline;
        let allItemsGlobal = [];

        window.currentFilter = 'all';
        window.currentIssueFilter = 'none';
        window.allSelectedState = true;

        window.contactItemCode = "";

        // =========================================================
        // نظام الذاكرة العميقة (Offline-First) لسرعة الصاروخ
        // =========================================================
        function initOfflineDBAndLoad() {
            const request = indexedDB.open("FaidyOfflineDB", 1);
            request.onupgradeneeded = function(event) {
                dbOffline = event.target.result;
                if (!dbOffline.objectStoreNames.contains('items')) { dbOffline.createObjectStore('items', { keyPath: 'id' }); }
                if (!dbOffline.objectStoreNames.contains('settings')) { dbOffline.createObjectStore('settings', { keyPath: 'id' }); }
            };
            request.onsuccess = function(event) {
                dbOffline = event.target.result;
                loadOfflineDataFirst();
            };
            request.onerror = function() { loadCloudData(); };
        }

        function loadOfflineDataFirst() {
            const txSet = dbOffline.transaction('settings', 'readonly');
            const storeSet = txSet.objectStore('settings');
            storeSet.get('logo').onsuccess = e => { if(e.target.result && document.getElementById("faidyMainLogo").src.includes('placeholder')) document.getElementById("faidyMainLogo").src = e.target.result.value; };
            storeSet.get('branchImg').onsuccess = e => { 
                if(e.target.result) {
                    document.getElementById("main-header-branches-img").src = e.target.result.value;
                    const preview = document.getElementById("branchesUnifiedImgPreview");
                    if(preview) { preview.src = e.target.result.value; preview.style.display = "inline-block"; }
                }
            };
            storeSet.get('branchesList').onsuccess = e => { if(e.target.result) { window.globalBranches = e.target.result.value; renderBranches(); }};

            const tx = dbOffline.transaction('items', 'readonly');
            const store = tx.objectStore('items');
            store.getAll().onsuccess = function(e) {
                if(e.target.result && e.target.result.length > 0 && allItemsGlobal.length === 0) {
                    allItemsGlobal = e.target.result;
                    queueRender();
                }
                loadCloudData();
            };
        }

        function updateItemInDB(item) { if(dbOffline) { const tx = dbOffline.transaction('items', 'readwrite'); tx.objectStore('items').put(item); } }
        function deleteItemFromDB(id) { if(dbOffline) { const tx = dbOffline.transaction('items', 'readwrite'); tx.objectStore('items').delete(id); } }
        function saveSetting(key, value) { if(dbOffline) { const tx = dbOffline.transaction('settings', 'readwrite'); tx.objectStore('settings').put({ id: key, value: value }); } }

        // =========================================================
        // التزامن الذكي والجزئي مع السحابة (Smart Cloud Sync)
        // =========================================================
        function loadCloudData() {
            dbCloud.ref('settings').on('value', (snapshot) => {
                const settings = snapshot.val() || {};
                if (settings.logo) { document.getElementById("faidyMainLogo").src = settings.logo; saveSetting('logo', settings.logo); }
                if (settings.branchImage) { 
                    const preview = document.getElementById("branchesUnifiedImgPreview"); 
                    const headerImg = document.getElementById("main-header-branches-img"); 
                    if(preview) { preview.src = settings.branchImage; preview.style.display = "inline-block"; } 
                    if(headerImg) { headerImg.src = settings.branchImage; } 
                    saveSetting('branchImg', settings.branchImage);
                }
                if (settings.branches) { window.globalBranches = Object.values(settings.branches); saveSetting('branchesList', window.globalBranches); } 
                else { window.globalBranches = [ { id: 1, name: "الرئيسي", phone: "091-XXXXXXX", pass: "2026" } ]; }
                renderBranches();
            });

            dbCloud.ref('items').on('child_added', (snapshot) => {
                const item = snapshot.val();
                const idx = allItemsGlobal.findIndex(i => i.id === item.id);
                if(idx === -1) { allItemsGlobal.push(item); } else { allItemsGlobal[idx] = item; }
                updateItemInDB(item); queueRender();
            });

            dbCloud.ref('items').on('child_changed', (snapshot) => {
                const item = snapshot.val();
                const idx = allItemsGlobal.findIndex(i => i.id === item.id);
                if(idx !== -1) { allItemsGlobal[idx] = item; } else { allItemsGlobal.push(item); }
                updateItemInDB(item); queueRender();
            });

            dbCloud.ref('items').on('child_removed', (snapshot) => {
                const item = snapshot.val();
                allItemsGlobal = allItemsGlobal.filter(i => i.id !== item.id);
                deleteItemFromDB(item.id); queueRender();
            });
        }

        // =========================================================
        // تقنية التجميع وتخفيف الضغط عن المتصفح (Chunked Rendering)
        // =========================================================
        function queueRender() {
            if(renderTimeout) clearTimeout(renderTimeout);
            renderTimeout = setTimeout(() => { renderItemsUIBatched(); }, 150);
        }

        let renderIndex = 0;
        const BATCH_SIZE = 15;
        let filteredList = [];

        function updateCategoriesUI() {
            categories = [...new Set(allItemsGlobal.map(i => i.cat))].filter(Boolean);
            if(categories.length === 0) categories = ["عام"];
            const currentCatString = categories.join(',');
            if (currentCatString !== lastCategoriesString) {
                lastCategoriesString = currentCatString;
                const sel = document.getElementById('mainCategory');
                const filterArea = document.getElementById('filter-tags');
                if(sel) sel.innerHTML = '';
                if(filterArea) filterArea.innerHTML = '<button class="filter-btn '+(window.currentFilter==='all'?'active':'')+'" onclick="filterByCat(\'all\', this)">الكل</button>';
                categories.forEach(c => {
                    if(sel) sel.add(new Option(c, c));
                    if(filterArea) {
                        const btn = document.createElement('button'); 
                        btn.className = 'filter-btn ' + (window.currentFilter===c?'active':''); 
                        const isHidden = hiddenCategories.includes(c);
                        if (isHidden) { btn.classList.add('hidden-cat'); }
                        btn.innerHTML = `${c} <span class="cat-visibility-toggle admin-only" title="إظهار/حجب القسم" onclick="toggleCategoryVisibility('${c}', event)">${isHidden ? '🚫' : '👁️'}</span>`;
                        btn.onclick = function() { filterByCat(c, this); }; 
                        filterArea.appendChild(btn);
                    }
                });
            }
        }

        function renderItemsUIBatched() {
            updateCategoriesUI();
            runDataAudit();
            
            const container = document.getElementById('main-container');
            container.innerHTML = ''; 
            
            const query = document.getElementById('globalSearch').value.toLowerCase(); 
            const cat = window.currentFilter || 'all'; 
            const issue = window.currentIssueFilter || 'none';
            const isAdmin = !document.body.classList.contains('admin-locked');
            
            filteredList = allItemsGlobal.filter(data => {
                if(data.isPlaceholder) return false;
                if(!isAdmin && hiddenCategories.includes(data.cat)) return false;
                if(!isAdmin && data.selectedForMenu === false) return false;
                
                const name = (data.name||'').toLowerCase();
                const code = (data.code||'').toLowerCase();
                if(query && !(name.includes(query) || code.includes(query))) return false;
                if(cat !== 'all' && data.cat !== cat) return false;
                
                if (issue !== 'none') {
                    const isNoPrice = (data.price === '0.00' || data.price === '0' || data.price === '');
                    const isNoCode = (data.code === '000' || data.code === '00' || data.code === '0' || data.code === '');
                    const isNoImg = (!data.img || data.img.includes('placeholder.com') || data.img === '');
                    const isNoName = (!data.name || data.name.trim() === '' || data.name === 'صنف جديد');
                    const isNoLink = (!data.driveLink || data.driveLink.trim() === '');
                    
                    if (issue === 'no-price' && !isNoPrice) return false;
                    if (issue === 'no-code' && !isNoCode) return false;
                    if (issue === 'no-img' && !isNoImg) return false;
                    if (issue === 'no-name' && !isNoName) return false;
                    if (issue === 'no-link' && !isNoLink) return false;
                    if (issue === 'all-issues' && !(isNoPrice||isNoCode||isNoImg||isNoName||isNoLink)) return false;
                }
                return true;
            }).sort((a,b) => a.id - b.id);
            
            const tc = document.getElementById('total-count');
            if(tc) tc.innerText = filteredList.length;
            
            renderIndex = 0;
            processNextBatch();
        }

        function processNextBatch() {
            const container = document.getElementById('main-container');
            const end = Math.min(renderIndex + BATCH_SIZE, filteredList.length);
            const fragment = document.createDocumentFragment();
            
            for (let i = renderIndex; i < end; i++) {
                fragment.appendChild(createItemCardDOM(filteredList[i]));
            }
            container.appendChild(fragment);
            renderIndex = end;
            
            if (renderIndex < filteredList.length) { setTimeout(processNextBatch, 30); }
        }

        // =========================================================
        // خوارزمية الضغط التلقائي للصور (Auto-Compression)
        // =========================================================
        function updateImg(id, input) { 
            if (input.files && input.files[0]) { 
                const file = input.files[0];
                const reader = new FileReader(); 
                reader.onload = function(e) { 
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        let width = img.width; let height = img.height;
                        const MAX_DIMENSION = 500; 

                        if (width > height) { if (width > MAX_DIMENSION) { height *= MAX_DIMENSION / width; width = MAX_DIMENSION; } } 
                        else { if (height > MAX_DIMENSION) { width *= MAX_DIMENSION / height; height = MAX_DIMENSION; } }
                        
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        const compressedBase64 = canvas.toDataURL('image/jpeg', 0.6);
                        document.getElementById('img-' + id).src = compressedBase64;
                        updateField(id, 'img', compressedBase64);
                    };
                    img.src = e.target.result;
                }; 
                reader.readAsDataURL(file); 
            } 
        }

        // =========================================================
        // التصدير والاستيراد (JSON Hybrid)
        // =========================================================
        function exportLocalToJSON() {
            if(allItemsGlobal.length === 0) { alert("⚠️ لا توجد بيانات لتصديرها."); return; }
            let exportData = { items: {}, settings: { branches: {}, logo: document.getElementById("faidyMainLogo").src.includes("data:image") ? document.getElementById("faidyMainLogo").src : "", branchImage: document.getElementById("main-header-branches-img").src.includes("data:image") ? document.getElementById("main-header-branches-img").src : "" } };
            allItemsGlobal.forEach(i => { exportData.items[i.id] = i; });
            window.globalBranches.forEach(b => { exportData.settings.branches[b.id] = b; });
            const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: "application/json;charset=utf-8" });
            const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = "faidy_work_backup_" + Date.now() + ".json"; link.click();
            alert("✅ تم حفظ نسخة من عملك في ملف JSON بنجاح!");
        }

        function importLocalJSON(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    let itemsToImport = []; let branchesToImport = [];
                    if (data.items) itemsToImport = Object.values(data.items); else itemsToImport = Object.values(data); 
                    if (data.settings && data.settings.branches) branchesToImport = Object.values(data.settings.branches);

                    allItemsGlobal = itemsToImport.filter(i => !i.isPlaceholder);
                    if(branchesToImport.length > 0) window.globalBranches = branchesToImport;
                    if (data.settings && data.settings.logo) document.getElementById("faidyMainLogo").src = data.settings.logo;
                    if (data.settings && data.settings.branchImage) {
                        document.getElementById("main-header-branches-img").src = data.settings.branchImage;
                        document.getElementById("branchesUnifiedImgPreview").src = data.settings.branchImage;
                        document.getElementById("branchesUnifiedImgPreview").style.display = "inline-block";
                    }
                    
                    queueRender();
                    renderBranches();

                    const tx = dbOffline.transaction(['items', 'settings'], 'readwrite');
                    const storeItems = tx.objectStore('items'); storeItems.clear();
                    itemsToImport.forEach(i => { if(!i.isPlaceholder) storeItems.put(i); });
                    if(branchesToImport.length > 0) tx.objectStore('settings').put({ id: 'branchesList', value: branchesToImport });
                    if(data.settings && data.settings.logo) tx.objectStore('settings').put({ id: 'logo', value: data.settings.logo });
                    if(data.settings && data.settings.branchImage) tx.objectStore('settings').put({ id: 'branchImg', value: data.settings.branchImage });

                    let updates = {};
                    itemsToImport.forEach(i => { updates['items/' + i.id] = i; });
                    if(branchesToImport.length > 0) { branchesToImport.forEach(b => { updates['settings/branches/' + b.id] = b; }); }
                    if (data.settings && data.settings.logo) updates['settings/logo'] = data.settings.logo;
                    if (data.settings && data.settings.branchImage) updates['settings/branchImage'] = data.settings.branchImage;
                    
                    dbCloud.ref().update(updates).catch(e => console.log("وضع الأوفلاين: التعديلات في اللوحة فقط وتنتظر الإنترنت."));
                    alert("✅ تم حقن البيانات بنجاح! \nإذا كنت متصلاً بالإنترنت سيتم تحديث السحابة فوراً.");
                } catch (error) { alert("❌ خطأ في قراءة الملف: " + error.message); }
                input.value = '';
            };
            reader.readAsText(file);
        }

        function loadHiddenCategoriesStorage() { const saved = localStorage.getItem("faidy_hidden_categories"); if (saved) { hiddenCategories = JSON.parse(saved); } }
        function toggleCategoryVisibility(catName, event) { event.stopPropagation(); const index = hiddenCategories.indexOf(catName); if (index > -1) { hiddenCategories.splice(index, 1); } else { hiddenCategories.push(catName); } localStorage.setItem("faidy_hidden_categories", JSON.stringify(hiddenCategories)); queueRender(); }

        // الدالة المعدلة جذريا: الاستيراد بدون انتظار الإنترنت (Offline-First)
        function processLinksExcel(input) {
            const file = input.files[0];
            if (!file) return;
            alert("جاري تحليل ملف الإكسيل ومزامنة الروابط...");
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result); const workbook = XLSX.read(data, {type: 'array'}); const worksheet = workbook.Sheets[workbook.SheetNames[0]]; const json = XLSX.utils.sheet_to_json(worksheet, { defval: "" });
                    if(json.length === 0) { alert("⚠️ الملف فارغ!"); input.value = ''; return; }
                    const keys = Object.keys(json[0]); 
                    const codeKey = keys.find(k => k.trim() === "الكود" || k.includes("كود")); 
                    const linkKey = keys.find(k => k.trim() === "الرابط" || k.includes("رابط"));
                    if (!codeKey || !linkKey) { alert("⚠️ خطأ في الأعمدة. تأكد من وجود عمود 'الكود' وعمود 'الرابط'."); input.value = ''; return; }

                    let updatedCount = 0; let updates = {};
                    json.forEach(row => {
                        let rowCode = row[codeKey]; let rowLink = row[linkKey];
                        if (rowCode !== undefined && rowCode !== "" && rowLink && rowLink !== "") {
                            let cleanRowCode = String(rowCode).trim(); 
                            let directLink = String(rowLink).trim();
                            
                            const idMatch = directLink.match(/[-\w]{25,}/);
                            if (idMatch && idMatch[0]) {
                                directLink = `https://drive.google.com/uc?id=${idMatch[0]}`;
                                
                                let itemIndex = allItemsGlobal.findIndex(i => String(i.code).trim() === cleanRowCode || Number(String(i.code).trim()) === Number(cleanRowCode));
                                if (itemIndex > -1) {
                                    let item = allItemsGlobal[itemIndex];
                                    item.driveLink = directLink; 
                                    updateItemInDB(item); 
                                    updates[item.id + '/driveLink'] = directLink; 
                                    updatedCount++;
                                }
                            }
                        }
                    });
                    
                    if (updatedCount > 0) { 
                        queueRender(); 
                        dbCloud.ref('items').update(updates).catch(e => console.log("سيتم التحديث السحابي تلقائياً عند توفر الإنترنت."));
                        alert(`✅ اكتملت العملية! تم استيراد وتحديث الروابط لتكون مباشرة لـ (${updatedCount}) صنف.`); 
                    } else { 
                        alert("لم يتم العثور على أي تحديثات صالحة أو روابط صحيحة."); 
                    }
                    input.value = '';
                } catch (err) { alert("❌ حدث خطأ: " + err.message); input.value = ''; }
            };
            reader.readAsArrayBuffer(file);
        }
