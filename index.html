        function filterByCat(cat, btn) {
            document.querySelectorAll('.issue-btn').forEach(b => b.classList.remove('active')); window.currentIssueFilter = 'none';
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            if(btn) { btn.classList.add('active'); } else { document.querySelectorAll('.filter-btn').forEach(b => { const cleanText = b.innerText.replace(/[^\u0600-\u06FFa-zA-Z0-9 ]/g, '').trim(); if(cleanText === cat || (cat === 'all' && cleanText === 'الكل')) b.classList.add('active'); }); }
            window.currentFilter = cat; filterItems();
        }

        function filterByIssue(issueType, btn) {
            document.querySelectorAll('.issue-btn').forEach(b => b.classList.remove('active'));
            if (window.currentIssueFilter === issueType) { window.currentIssueFilter = 'none'; filterByCat('all', document.querySelector('.filter-btn')); } else { btn.classList.add('active'); window.currentIssueFilter = issueType; filterItems(); }
        }

        function filterItems() {
            const query = document.getElementById('globalSearch').value.toLowerCase(); const cat = window.currentFilter || 'all'; const issue = window.currentIssueFilter || 'none'; const cards = document.querySelectorAll('.item-card'); let activeCounter = 0;
            const isAdmin = !document.body.classList.contains('admin-locked');
            
            cards.forEach(card => {
                const nameDisplay = card.querySelector('.name-display'); const codeDisplay = card.querySelector('.editable-code'); const priceDisplay = card.querySelector('.price-display'); const imgContainer = card.querySelector('.img-preview-container'); const imgEl = imgContainer.querySelector('img');
                const linkBtn = card.querySelector('.gold-drive-btn'); const driveLink = linkBtn ? (linkBtn.getAttribute('data-link') || '').trim() : '';

                const name = nameDisplay.innerText.toLowerCase(); const code = codeDisplay.innerText.toLowerCase(); const price = priceDisplay.innerText.trim(); const imgSrc = imgEl ? imgEl.src : ''; const itemCat = card.dataset.category;
                const matchSearch = name.includes(query) || code.includes(query); const matchCat = (cat === 'all' || itemCat === cat);
                let matchIssue = true;
                const isNoPrice = (price === '0.00' || price === '0' || price === ''); const isNoCode = (code === '000' || code === '00' || code === '0' || code === ''); const isNoImg = (imgSrc.includes('placeholder.com') || imgSrc === ''); const isNoName = (name.trim() === '' || name === 'صنف جديد'); const isNoLink = (driveLink === '');

                if (issue === 'no-price') { matchIssue = isNoPrice; } else if (issue === 'no-code') { matchIssue = isNoCode; } else if (issue === 'no-img') { matchIssue = isNoImg; } else if (issue === 'no-name') { matchIssue = isNoName; } else if (issue === 'no-link') { matchIssue = isNoLink; } else if (issue === 'all-issues') { matchIssue = (isNoPrice || isNoCode || isNoImg || isNoName || isNoLink); }

                if (issue === 'all-issues' && matchIssue && isAdmin) { 
                    priceDisplay.style.backgroundColor = isNoPrice ? 'rgba(255, 0, 0, 0.15)' : 'transparent'; codeDisplay.style.backgroundColor = isNoCode ? 'rgba(255, 0, 0, 0.15)' : 'transparent'; nameDisplay.style.backgroundColor = isNoName ? 'rgba(255, 0, 0, 0.15)' : 'transparent'; imgContainer.style.border = isNoImg ? '2px solid red' : '1px dashed #ddd'; if(linkBtn) linkBtn.style.boxShadow = isNoLink ? '0 0 8px red' : 'none'; 
                } else { 
                    priceDisplay.style.backgroundColor = 'transparent'; codeDisplay.style.backgroundColor = 'transparent'; nameDisplay.style.backgroundColor = 'transparent'; imgContainer.style.border = '1px dashed #ddd'; if(linkBtn) linkBtn.style.boxShadow = 'none'; 
                }

                if(matchSearch && matchCat && matchIssue) { card.style.display = 'flex'; activeCounter++; } else { card.style.display = 'none'; }
            });
            const totalCountEl = document.getElementById('total-count');
            if(totalCountEl) totalCountEl.innerText = activeCounter;
        }

            if (newLink !== null) {

                const fileIdRegex = /(?:drive\.google\.com\/(?:file\/d\/|open\?id=)|id=)([a-zA-Z0-9_-]{25,})/; const match = cleanLink.match(fileIdRegex);

        function runDataAudit() {
            let incompleteCount = 0;
            allItemsGlobal.forEach(i => {
                if (i.isPlaceholder) return;
                const isNoPrice = (i.price === '0.00' || i.price === '0' || i.price === '');
                const isNoCode = (i.code === '000' || i.code === '00' || i.code === '0' || i.code === '');

            });
            const alertBox = document.getElementById('data-audit-alert'); const countSpan = document.getElementById('audit-count');

        // =========================================================

        function processRecoveryFile(input) {
            const file = input.files[0];
            if (!file) return;
            alert("جاري قراءة الأصناف من الملف ورفعها للسحابة.. الرجاء الانتظار.");
            const reader = new FileReader();
            reader.onload = function(e) {
                const htmlContent = e.target.result; const parser = new DOMParser(); const doc = parser.parseFromString(htmlContent, 'text/html'); const oldCards = doc.querySelectorAll('.item-card');
                if (oldCards.length === 0) { alert("⚠️ لم يتمكن النظام من قراءة الأصناف."); return; }
                let counter = 0; let updates = {};
                oldCards.forEach(card => {
                    const nameDisplayEl = card.querySelector('.name-display'); const priceDisplayEl = card.querySelector('.price-display'); const codeDisplayEl = card.querySelector('.editable-code'); const unitDisplayEl = card.querySelector('.unit-display');
                    const name = nameDisplayEl ? nameDisplayEl.innerText.trim() : 'صنف غير مسمى'; const price = priceDisplayEl ? priceDisplayEl.innerText.trim() : '0.00'; const code = codeDisplayEl ? codeDisplayEl.innerText.trim() : '000'; const unit = unitDisplayEl ? unitDisplayEl.innerText.trim() : 'كيلو';
                    const cat = card.getAttribute('data-category') || card.dataset.category || 'عام'; const imgEl = card.querySelector('img'); const img = imgEl ? imgEl.src : ''; const featured = card.classList.contains('is-featured');
                    const linkBtn = card.querySelector('.gold-drive-btn'); const driveLink = linkBtn ? linkBtn.getAttribute('data-link').trim() : '';
                    const itemId = Date.now() + counter;
                    updates[itemId] = { id: itemId, name: name, price: price, code: code, unit: unit, cat: cat, img: img, featured: featured, selectedForMenu: true, driveLink: driveLink };
                    counter++;
                });
                dbCloud.ref('items').update(updates).then(() => { alert("✅ تم استرجاع (" + counter + ") صنفاً بنجاح ورفعها للسحابة!"); });
            };
            reader.readAsText(file, "UTF-8");
        }

        function processLinksExcel(input) {
            const file = input.files[0];
            if (!file) return;
            alert("جاري تحليل ملف الإكسيل ومزامنة الروابط سحابياً...");
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result); const workbook = XLSX.read(data, {type: 'array'}); const worksheet = workbook.Sheets[workbook.SheetNames[0]]; const json = XLSX.utils.sheet_to_json(worksheet, { defval: "" });
                    if(json.length === 0) { alert("⚠️ الملف فارغ!"); input.value = ''; return; }
                    const keys = Object.keys(json[0]); const codeKey = keys.find(k => k.includes("كود") || k.includes("الكود") || k.toLowerCase() === "code"); const linkKey = keys.find(k => k.includes("رابط") || k.includes("الرابط") || k.toLowerCase().includes("link"));
                    if (!codeKey || !linkKey) { alert("⚠️ خطأ في الأعمدة."); input.value = ''; return; }

                    let updatedCount = 0; let updates = {};
                    json.forEach(row => {
                        let rowCode = row[codeKey]; let rowLink = row[linkKey];
                        if (rowCode !== undefined && rowCode !== "" && rowLink && rowLink !== "") {
                            let cleanRowCode = String(rowCode).trim(); let directLink = String(rowLink).trim();
                            if (directLink.includes("http") || directLink.includes("drive.google.com")) {
                                let itemToUpdate = allItemsGlobal.find(i => String(i.code).trim() === cleanRowCode || Number(String(i.code).trim()) === Number(cleanRowCode));
                                if (itemToUpdate) {
                                    const match = directLink.match(/(?:drive\.google\.com\/(?:file\/d\/|open\?id=)|id=)([a-zA-Z0-9_-]{25,})/);
                                    if (match && match[1]) directLink = `https://drive.google.com/uc?id=${match[1]}`;
                                    updates[itemToUpdate.id + '/driveLink'] = directLink;
                                    updatedCount++;
                                }
                            }
                        }
                    });
                    
                    if (Object.keys(updates).length > 0) { dbCloud.ref('items').update(updates).then(() => { alert(`✅ اكتملت العملية! تم استيراد وتحديث الروابط لـ (${updatedCount}) صنف.`); }); } else { alert("لم يتم العثور على أي تحديثات صالحة."); }
                    input.value = '';
                } catch (err) { alert("❌ حدث خطأ: " + err.message); input.value = ''; }
            };
            reader.readAsArrayBuffer(file);
        }
