<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منيو - حلواني أبناء الفايدي</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --primary: #5A0E1A; --secondary: #D4AF37; --bg: #EADCC1; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; }
        #loading-screen { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--bg); z-index: 999999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .loader { border: 6px solid #f3f3f3; border-top: 6px solid var(--primary); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; padding: 15px; max-width: 1000px; margin: 0 auto; }
        .card { background: white; padding: 12px; border-radius: 12px; text-align: center; border-bottom: 4px solid var(--primary); }
        .card img { width: 100%; height: 130px; object-fit: contain; }
        .btn-load-more { display: none; background: var(--primary); color: var(--secondary); padding: 12px 40px; border-radius: 25px; font-weight: bold; margin: 20px auto; cursor: pointer; border: 2px solid var(--secondary); }
    </style>
</head>
<body>
    <div id="loading-screen">
        <div class="loader"></div>
        <h3 id="load-text" style="color:var(--primary);">⏳ جاري الاتصال بالسحابة...</h3>
    </div>
    <div class="grid" id="menu-grid"></div>
    <button id="load-more-btn" class="btn-load-more" onclick="loadNextChunk()">👇 عرض المزيد</button>

    <script>
        firebase.initializeApp({ databaseURL: "https://faidy-menu-default-rtdb.europe-west1.firebasedatabase.app", projectId: "faidy-menu" });
        const dbCloud = firebase.database();
        const ROOT_PATH = 'OMS_SAAS_V1/Companies/faidy/items/';
        
        let lastKey = null;
        const CHUNK_SIZE = 8; 
        let totalLoaded = 0;

        // التحميل بدون قيود زمنية
        async function loadNextChunk() {
            let btn = document.getElementById('load-more-btn');
            btn.innerText = '⏳ جاري التحميل... (الرجاء الانتظار)';
            btn.disabled = true;

            let query = dbCloud.ref(ROOT_PATH).orderByKey();
            if (lastKey) query = query.startAfter(lastKey);
            query = query.limitToFirst(CHUNK_SIZE);
            
            let snap = await query.once('value');
            if (snap.exists()) {
                let obj = snap.val();
                let keys = Object.keys(obj);
                lastKey = keys[keys.length - 1];
                
                Object.values(obj).forEach(item => {
                    if (item && item.selectedForMenu !== false) {
                        let grid = document.getElementById('menu-grid');
                        let card = document.createElement('div');
                        card.className = 'card';
                        card.innerHTML = `<img src="${item.img || ''}" loading="lazy"><h4 style="color:var(--primary)">${item.name}</h4><p>${item.price} د.ل</p>`;
                        grid.appendChild(card);
                        totalLoaded++;
                    }
                });

                document.getElementById('loading-screen').style.display = 'none';
                btn.innerText = `👇 عرض المزيد (تم عرض ${totalLoaded})`;
                btn.disabled = false;
                if (keys.length < CHUNK_SIZE) btn.style.display = 'none';
                else btn.style.display = 'block';
            }
        }
        loadNextChunk();
    </script>
</body>
</html>
