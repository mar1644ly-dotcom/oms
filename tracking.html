<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تتبع طلبات الفايدي - البث الحي</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        
        body { font-family: 'Cairo', sans-serif; background-color: #fdfbf7; margin: 0; padding: 0; text-align: center; }
        
        .header { background: #800000; color: #EEDC82; padding: 15px; font-weight: 900; font-size: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        #role-selection { margin-top: 50px; display: flex; flex-direction: column; align-items: center; gap: 20px; padding: 20px; }
        
        .input-order { padding: 12px; border: 2px solid #D4AF37; border-radius: 8px; font-family: 'Cairo'; font-size: 16px; font-weight: bold; width: 80%; max-width: 300px; text-align: center; outline: none; }
        .input-order:focus { border-color: #800000; }

        .btn { padding: 15px 30px; border: none; border-radius: 10px; font-family: 'Cairo'; font-size: 18px; font-weight: bold; cursor: pointer; width: 80%; max-width: 300px; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn-driver { background: #27ae60; color: white; border: 2px solid #2ecc71; margin-top: 10px; }
        .btn-driver:hover { background: #2ecc71; transform: scale(1.05); }
        .btn-customer { background: #2980b9; color: white; border: 2px solid #3498db; margin-top: 10px;}
        .btn-customer:hover { background: #3498db; transform: scale(1.05); }
        .btn-stop { background: #c0392b; color: white; margin-top: 20px; display: none; }

        /* شاشة المندوب */
        #driver-screen { display: none; padding: 20px; margin-top: 20px; }
        .status-box { background: white; border: 2px dashed #D4AF37; padding: 20px; border-radius: 12px; margin: 20px auto; max-width: 400px; font-weight: bold; color: #800000; }
        .pulse { animation: pulseAnim 1.5s infinite alternate; color: #27ae60; font-size: 20px; }
        @keyframes pulseAnim { 0% { opacity: 0.5; } 100% { opacity: 1; } }

        /* شاشة الزبون */
        #customer-screen { display: none; padding: 10px; }
        #map { height: 75vh; width: 100%; max-width: 800px; margin: 0 auto; border: 4px solid #D4AF37; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); z-index: 1; }
        .customer-info { background: white; padding: 15px; border-radius: 10px; border: 1px solid #ddd; max-width: 800px; margin: 10px auto; font-weight: bold; color: #333; }
        
        .map-marker-icon { font-size: 35px; text-shadow: 2px 2px 5px rgba(0,0,0,0.5); }
        .order-tag { display: inline-block; background: #EEDC82; color: #800000; padding: 2px 10px; border-radius: 15px; font-size: 14px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="header">حلواني أبناء الفايدي - البث الحي للتوصيل</div>

    <div id="role-selection">
        <h3 style="color:#800000; margin-bottom:5px;">رقم الطلب (أو الفاتورة):</h3>
        <input type="text" id="manual-order-id" class="input-order" placeholder="أدخل رقم الطلب هنا...">
        <button class="btn btn-driver" onclick="startManual('driver')">🛵 بدء التوصيل (للمندوب)</button>
        <button class="btn btn-customer" onclick="startManual('customer')">📱 تتبع الطلب (للزبون)</button>
    </div>

    <div id="driver-screen">
        <h2 style="color:#27ae60; margin-bottom:5px;">واجهة مندوب التوصيل</h2>
        <div class="order-tag" id="driver-order-display">الطلب: غير محدد</div>
        <div class="status-box" id="driver-status">
            جاهز للانطلاق. اضغط على الزر لبدء بث الموقع للزبون.
        </div>
        <button class="btn btn-driver" id="btn-start" onclick="startTracking()">🚀 بدء التوصيل (مشاركة الـ GPS)</button>
        <button class="btn btn-stop" id="btn-stop" onclick="stopTracking()">🛑 إنهاء التوصيل (الوصول للزبون)</button>
    </div>

    <div id="customer-screen">
        <h2 style="color:#2980b9; margin-bottom:5px;">خريطة التتبع المباشر</h2>
        <div class="order-tag" id="customer-order-display">الطلب: غير محدد</div>
        <div class="customer-info" id="customer-status">
            جاري الاتصال بالسحابة... 📡
        </div>
        <div id="map"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBr-XVqipP8NBOakKQgYR4gfLyYaFDwqD8",
            authDomain: "faidy-web-app.firebaseapp.com",
            databaseURL: "https://faidy-web-app-default-rtdb.firebaseio.com",
            projectId: "faidy-web-app",
            storageBucket: "faidy-web-app.firebasestorage.app",
            messagingSenderId: "425340022026",
            appId: "1:425340022026:web:9342a7b3426a71fb9e1ef3"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const dbTrack = firebase.database();
        
        let CURRENT_ORDER_ID = null;
        let watchId = null;
        let map = null;
        let driverMarker = null;
        let wakeLock = null; // متغير الشاشة النشطة

        // ---------- الذكاء في قراءة الرابط ---------- //
        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const roleParam = urlParams.get('role');
            const idParam = urlParams.get('id');

            if (roleParam && idParam) {
                CURRENT_ORDER_ID = "Order_" + idParam;
                document.getElementById('role-selection').style.display = 'none';
                
                if (roleParam === 'driver') {
                    document.getElementById('driver-order-display').innerText = "الطلب رقم: " + idParam;
                    document.getElementById('driver-screen').style.display = 'block';
                } else if (roleParam === 'customer') {
                    document.getElementById('customer-order-display').innerText = "الطلب رقم: " + idParam;
                    document.getElementById('customer-screen').style.display = 'block';
                    initMap();
                    listenToDriverLocation();
                }
            }
        };

        function startManual(role) {
            const inputVal = document.getElementById('manual-order-id').value.trim();
            if (!inputVal) { alert("الرجاء إدخال رقم الطلب أولاً!"); return; }
            
            // إعادة توجيه المتصفح لتنظيف الرابط وإضافة المتغيرات
            window.location.href = `?role=${role}&id=${inputVal}`;
        }

        // ---------- أكواد منع انطفاء الشاشة (Wake Lock API) ---------- //
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    console.log('✅ تم تفعيل وضع الشاشة النشطة (لن تنطفئ الشاشة).');
                    
                    wakeLock.addEventListener('release', () => {
                        console.log('❌ تم إيقاف وضع الشاشة النشطة.');
                    });
                }
            } catch (err) {
                console.error(`خطأ في Wake Lock: ${err.message}`);
            }
        }

        // إعادة تفعيل الشاشة إذا قام المندوب بتصغير المتصفح ثم فتحه مجدداً
        document.addEventListener('visibilitychange', async () => {
            if (wakeLock !== null && document.visibilityState === 'visible') {
                await requestWakeLock();
            }
        });

        // ---------- أكواد المندوب (الإرسال) ---------- //
        async function startTracking() {
            if (!navigator.geolocation) {
                alert("جهازك لا يدعم تحديد الموقع (GPS)."); return;
            }

            // تفعيل الشاشة النشطة
            await requestWakeLock();

            document.getElementById('driver-status').innerHTML = "جاري الاتصال بالأقمار الصناعية... ⏳";

            watchId = navigator.geolocation.watchPosition(
                function(position) {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    const speed = position.coords.speed || 0; 
                    
                    dbTrack.ref('Live_Tracking/' + CURRENT_ORDER_ID).set({
                        lat: lat,
                        lng: lng,
                        speed: speed,
                        timestamp: Date.now(),
                        status: 'on_the_way'
                    });

                    document.getElementById('driver-status').innerHTML = `<div class="pulse">📡 البث يعمل بقوة... يتم إرسال موقعك.</div><br><span style="font-size:12px; color:#555;">لا تقم بإغلاق هذه الصفحة حتى تصل.</span>`;
                    document.getElementById('btn-start').style.display = 'none';
                    document.getElementById('btn-stop').style.display = 'block';
                },
                function(error) {
                    document.getElementById('driver-status').innerHTML = "❌ خطأ في الـ GPS: " + error.message;
                },
                { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 }
            );
        }

        function stopTracking() {
            if (watchId) navigator.geolocation.clearWatch(watchId);
            dbTrack.ref('Live_Tracking/' + CURRENT_ORDER_ID).update({ status: 'delivered', timestamp: Date.now() });
            
            if (wakeLock !== null) { wakeLock.release(); wakeLock = null; } // تحرير الشاشة

            document.getElementById('driver-status').innerHTML = "🎉 تمت المهمة! تم إيقاف البث بنجاح.";
            document.getElementById('btn-start').style.display = 'block';
            document.getElementById('btn-stop').style.display = 'none';
        }

        // ---------- أكواد الزبون (الاستقبال والخريطة) ---------- //
        function initMap() {
            map = L.map('map').setView([32.1167, 20.0667], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; الفايدي لتتبع الطلبات',
                maxZoom: 19
            }).addTo(map);

            const bikeIcon = L.divIcon({
                html: '<div class="map-marker-icon">🛵</div>',
                className: 'dummy',
                iconSize: [40, 40],
                iconAnchor: [20, 40]
            });

            driverMarker = L.marker([32.1167, 20.0667], {icon: bikeIcon}).addTo(map);
        }

        function listenToDriverLocation() {
            dbTrack.ref('Live_Tracking/' + CURRENT_ORDER_ID).on('value', (snapshot) => {
                const data = snapshot.val();
                if (data && data.lat && data.lng) {
                    
                    if(data.status === 'delivered') {
                        document.getElementById('customer-status').innerHTML = "🎉 وصل المندوب! صحتين وعافية.";
                        document.getElementById('customer-status').style.color = "#27ae60";
                        return;
                    }

                    const newLatLng = new L.LatLng(data.lat, data.lng);
                    driverMarker.setLatLng(newLatLng);
                    map.panTo(newLatLng, {animate: true, duration: 1});

                    let speedKm = (data.speed * 3.6).toFixed(1);
                    document.getElementById('customer-status').innerHTML = `🛵 طلبك في الطريق الآن... (السرعة: ${speedKm > 0 ? speedKm : 0} كم/س)`;
                } else {
                    document.getElementById('customer-status').innerHTML = "الطلب قيد التجهيز أو المندوب لم ينطلق بعد... ⏳";
                }
            });
        }
    </script>
</body>
</html>
