<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>SaaS Master Control - لوحة المالك</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f0f2f5; margin: 0; padding: 0; }
        
        .super-header { background: #1a252f; color: white; padding: 20px; text-align: center; border-bottom: 4px solid #3498db; }
        .super-header h1 { margin: 0; font-size: 24px; font-weight: 900; letter-spacing: 1px; }
        .super-header p { margin: 5px 0 0 0; font-size: 14px; color: #bdc3c7; }

        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; display: flex; gap: 20px; flex-wrap: wrap; align-items: flex-start; }
        
        /* فورم إضافة العميل */
        .add-company-card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); flex: 1; min-width: 300px; border-top: 5px solid #3498db; }
        .add-company-card h2 { margin-top: 0; color: #2c3e50; border-bottom: 2px dashed #eee; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .btn-reset { background: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 6px; font-family: 'Cairo'; font-size: 12px; cursor: pointer; font-weight: bold; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: bold; color: #34495e; margin-bottom: 5px; font-size: 14px; }
        .form-input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-family: 'Cairo'; font-weight: bold; box-sizing: border-box; outline: none; }
        .form-input:disabled { background-color: #e9ecef; cursor: not-allowed; }
        
        .color-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .color-picker { flex: 1; text-align: center; background: #f9f9f9; padding: 10px; border-radius: 6px; border: 1px solid #ddd; }
        .color-picker input[type="color"] { width: 100%; height: 40px; border: none; cursor: pointer; padding: 0; background: transparent; }
        
        .logo-preview-box { background: #fdfbf7; border: 2px dashed #bdc3c7; border-radius: 8px; padding: 10px; text-align: center; margin-top: 10px; display: none; }
        .logo-preview-box img { max-height: 80px; object-fit: contain; border-radius: 6px; }

        .btn { padding: 12px 20px; border: none; border-radius: 6px; font-family: 'Cairo'; font-weight: bold; cursor: pointer; color: white; font-size: 15px; width: 100%; transition: 0.3s; }
        .btn-primary { background: #3498db; } .btn-primary:hover { background: #2980b9; }
        .btn-theme-preset { background: #ecf0f1; color: #2c3e50; border: 1px solid #bdc3c7; margin-bottom: 10px; }
        .btn-theme-preset:hover { background: #e0e6ed; }

        /* قائمة العملاء */
        .companies-list-card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); flex: 2; min-width: 300px; }
        .companies-list-card h2 { margin-top: 0; color: #2c3e50; border-bottom: 2px dashed #eee; padding-bottom: 10px; }
        
        .client-card { border: 1px solid #eee; border-radius: 8px; padding: 15px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; background: #fafbfc; transition: 0.3s; }
        .client-card:hover { border-color: #3498db; box-shadow: 0 2px 8px rgba(52,152,219,0.1); }
        .client-info h3 { margin: 0 0 5px 0; color: #2c3e50; }
        .client-info p { margin: 0; font-size: 13px; color: #7f8c8d; font-weight: bold; }
        .client-id-badge { background: #2c3e50; color: white; padding: 3px 8px; border-radius: 4px; font-size: 11px; margin-right: 5px; }
        
        .color-dots { display: flex; gap: 5px; margin-top: 10px; }
        .color-dot { width: 20px; height: 20px; border-radius: 50%; border: 1px solid #ccc; }
        
        .client-actions { display: flex; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
        .btn-small { padding: 6px 12px; border-radius: 4px; font-size: 12px; border: none; cursor: pointer; font-family: 'Cairo'; font-weight: bold; color: white; }

        /* نافذة إدارة الفروع (Modal) */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 10000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 12px; width: 90%; max-width: 500px; }
        .modal-content h2 { margin-top: 0; color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .branch-item { display: flex; justify-content: space-between; align-items: center; background: #f9f9f9; padding: 10px; border: 1px solid #eee; border-radius: 6px; margin-bottom: 8px; }
        .branch-item-info b { color: #2c3e50; font-size: 14px; }
        .branch-item-info span { color: #7f8c8d; font-size: 12px; display: block; }
    </style>
</head>
<body>

    <div class="super-header">
        <h1>🚀 منصة الإدارة المركزية (SaaS Master)</h1>
        <p>لوحة تحكم المؤسس - إدارة العملاء، الهوية البصرية، الفروع، والشعارات</p>
    </div>

    <div class="container">
        <!-- قسم تسجيل عميل جديد -->
        <div class="add-company-card">
            <h2>
                <span>تحديث / تسجيل عميل</span>
                <button class="btn-reset" onclick="resetForm()">عميل جديد +</button>
            </h2>
            
            <div class="form-group">
                <label>الاسم التجاري للعميل:</label>
                <input type="text" id="comp-name" class="form-input" placeholder="مثال: حلواني أبناء الفايدي">
            </div>
            
            <div class="form-group">
                <label>المعرف البرمجي (بالحروف الإنجليزية فقط بدون مسافات):</label>
                <input type="text" id="comp-id" class="form-input" placeholder="مثال: faidy">
            </div>

            <hr style="border:1px dashed #eee; margin:20px 0;">
            <label style="display:block; font-weight:bold; color:#34495e; margin-bottom:10px;">🎨 الهوية البصرية للعميل:</label>
            
            <button class="btn btn-theme-preset" onclick="applyPreset('faidy')">👑 قالب الفايدي (عنابي، ذهبي، بيج داكن)</button>
            <button class="btn btn-theme-preset" onclick="applyPreset('general')">🏢 قالب عام/محايد (كحلي ورمادي)</button>

            <div class="color-row">
                <div class="color-picker">
                    <label style="font-size:11px;">اللون الأساسي</label>
                    <input type="color" id="col-primary" value="#5A0E1A">
                </div>
                <div class="color-picker">
                    <label style="font-size:11px;">اللون الثانوي</label>
                    <input type="color" id="col-secondary" value="#D4AF37">
                </div>
                <div class="color-picker">
                    <label style="font-size:11px;">لون الخلفية</label>
                    <input type="color" id="col-bg" value="#EADCC1">
                </div>
            </div>

            <div class="form-group" style="margin-top: 15px;">
                <label>🖼️ شعار الشركة (اللوجو):</label>
                <input type="file" id="comp-logo" class="form-input" accept="image/*" onchange="handleLogoUpload(this)">
                <div id="logo-preview" class="logo-preview-box">
                    <div style="font-size:11px; color:#7f8c8d; margin-bottom:5px;">معاينة الشعار</div>
                    <img id="logo-img" src="">
                </div>
            </div>

            <button class="btn btn-primary" style="margin-top:10px;" onclick="createNewClient()">💾 حفظ بيانات العميل والهوية</button>
        </div>

        <!-- قسم عرض العملاء الحاليين -->
        <div class="companies-list-card">
            <h2>🏢 قائمة العملاء النشطين</h2>
            <div id="clients-list-container">
                <div style="text-align:center; padding:20px; color:#7f8c8d;">جاري تحميل العملاء...</div>
            </div>
        </div>
    </div>

    <!-- نافذة إدارة الفروع المنبثقة -->
    <div id="branch-modal" class="modal-overlay">
        <div class="modal-content">
            <h2>إدارة فروع العميل: <span id="modal-client-name" style="color:#3498db;"></span></h2>
            <input type="hidden" id="modal-client-id">
            
            <div style="background:#f0f2f5; padding:15px; border-radius:8px; margin-bottom:15px; border:1px solid #ddd;">
                <label style="font-weight:bold; font-size:14px; margin-bottom:5px; display:block;">إضافة فرع جديد:</label>
                <input type="text" id="new-b-name" class="form-input" placeholder="اسم الفرع (مثال: فرع فينيسيا)" style="margin-bottom:8px;">
                <input type="text" id="new-b-phone" class="form-input" placeholder="رقم هاتف الفرع" style="margin-bottom:8px;">
                <input type="text" id="new-b-pass" class="form-input" placeholder="الرقم السري لتسجيل دخول الكاشير" style="margin-bottom:8px;">
                <button class="btn btn-primary" style="background:#27ae60;" onclick="addBranchToClient()">➕ حفظ الفرع للعميل</button>
            </div>

            <div style="max-height:200px; overflow-y:auto; border-top:1px dashed #ccc; padding-top:10px;" id="client-branches-list">
                <!-- الفروع ستظهر هنا -->
            </div>

            <button class="btn" style="background:#7f8c8d; margin-top:15px;" onclick="document.getElementById('branch-modal').style.display='none'">إغلاق النافذة</button>
        </div>
    </div>

    <script>
        firebase.initializeApp({ databaseURL: "https://faidy-web-app-default-rtdb.firebaseio.com", projectId: "faidy-web-app" });
        const dbCloud = firebase.database();
        const SAAS_PATH = 'OMS_SAAS_V1/Companies/';

        let currentClientsData = {};
        let currentLogoBase64 = ''; 

        function applyPreset(type) {
            if(type === 'faidy') {
                document.getElementById('col-primary').value = '#5A0E1A'; 
                document.getElementById('col-secondary').value = '#D4AF37'; 
                document.getElementById('col-bg').value = '#EADCC1'; 
            } else if (type === 'general') {
                document.getElementById('col-primary').value = '#2c3e50'; 
                document.getElementById('col-secondary').value = '#3498db'; 
                document.getElementById('col-bg').value = '#f8f9fa'; 
            }
        }

        function handleLogoUpload(input) {
            if (input.files && input.files[0]) {
                let reader = new FileReader();
                reader.onload = function (e) {
                    currentLogoBase64 = e.target.result;
                    document.getElementById('logo-preview').style.display = 'block';
                    document.getElementById('logo-img').src = currentLogoBase64;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        // 💡 دالة تفريغ الحقول لإنشاء عميل جديد
        function resetForm() {
            document.getElementById('comp-name').value = '';
            document.getElementById('comp-id').value = '';
            document.getElementById('comp-id').disabled = false;
            document.getElementById('comp-logo').value = '';
            document.getElementById('logo-preview').style.display = 'none';
            currentLogoBase64 = '';
        }

        // 💡 دالة سحب بيانات العميل للتعديل
        function editClient(compId) {
            let data = currentClientsData[compId]?.settings || {};
            let profile = data.profile || {};
            let brand = data.branding || {};

            document.getElementById('comp-name').value = profile.name || '';
            document.getElementById('comp-id').value = compId;
            document.getElementById('comp-id').disabled = true; // منع تغيير الـ ID

            if (brand.primaryColor) document.getElementById('col-primary').value = brand.primaryColor;
            if (brand.secondaryColor) document.getElementById('col-secondary').value = brand.secondaryColor;
            if (brand.bgColor) document.getElementById('col-bg').value = brand.bgColor;

            if (brand.logo) {
                currentLogoBase64 = brand.logo;
                document.getElementById('logo-preview').style.display = 'block';
                document.getElementById('logo-img').src = brand.logo;
            } else {
                currentLogoBase64 = '';
                document.getElementById('logo-preview').style.display = 'none';
                document.getElementById('logo-img').src = '';
            }
            
            // تمرير الشاشة للأعلى
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function createNewClient() {
            let name = document.getElementById('comp-name').value.trim();
            let id = document.getElementById('comp-id').value.trim().toLowerCase();
            let pCol = document.getElementById('col-primary').value;
            let sCol = document.getElementById('col-secondary').value;
            let bgCol = document.getElementById('col-bg').value;

            if(!name || !id) return alert("الرجاء إدخال اسم العميل والمعرف البرمجي.");

            let brandingData = { primaryColor: pCol, secondaryColor: sCol, bgColor: bgCol };
            if (currentLogoBase64 !== '') {
                brandingData.logo = currentLogoBase64;
            } else if (currentClientsData[id] && currentClientsData[id].settings.branding.logo) {
                brandingData.logo = currentClientsData[id].settings.branding.logo;
            }

            let clientData = {
                profile: { name: name, id: id, createdAt: firebase.database.ServerValue.TIMESTAMP },
                branding: brandingData
            };

            dbCloud.ref(SAAS_PATH + id + '/settings/profile').set(clientData.profile);
            dbCloud.ref(SAAS_PATH + id + '/settings/branding').set(clientData.branding).then(() => {
                alert("✅ تم حفظ العميل واعتماد الهوية والشعار بنجاح!");
                resetForm();
            });
        }

        dbCloud.ref(SAAS_PATH).on('value', snap => {
            let container = document.getElementById('clients-list-container');
            container.innerHTML = '';
            currentClientsData = {};
            
            if(!snap.exists()) {
                container.innerHTML = '<div style="text-align:center; padding:20px; font-weight:bold; color:#777;">لا يوجد عملاء حالياً. ابدأ بإضافة العميل الأول!</div>';
                return;
            }

            let companies = snap.val();
            currentClientsData = companies;

            for(let compId in companies) {
                let data = companies[compId].settings || {};
                let profile = data.profile || { name: 'غير معروف' };
                let brand = data.branding || { primaryColor:'#ccc', secondaryColor:'#ccc', bgColor:'#fff' };
                let branches = data.branches || [];
                let branchesCount = branches.length;

                let logoHtml = brand.logo ? `<img src="${brand.logo}" style="width:50px; height:50px; object-fit:contain; border-radius:8px; border:1px solid #ddd; background:#fff; padding:2px;">` : `<div style="width:50px; height:50px; border-radius:8px; background:#eee; display:flex; justify-content:center; align-items:center; font-size:24px;">🏢</div>`;

                container.innerHTML += `
                    <div class="client-card">
                        <div style="display:flex; gap:15px; align-items:center;">
                            ${logoHtml}
                            <div class="client-info">
                                <h3>${profile.name} <span class="client-id-badge">${compId}</span></h3>
                                <p>عدد الفروع النشطة: ${branchesCount}</p>
                                <div class="color-dots">
                                    <div class="color-dot" style="background:${brand.primaryColor}" title="أساسي"></div>
                                    <div class="color-dot" style="background:${brand.secondaryColor}" title="ثانوي"></div>
                                    <div class="color-dot" style="background:${brand.bgColor}" title="خلفية"></div>
                                </div>
                            </div>
                        </div>
                        <div class="client-actions">
                            <button class="btn-small" style="background:#f39c12;" onclick="editClient('${compId}')">تعديل ✏️</button>
                            <button class="btn-small" style="background:#27ae60;" onclick="openBranchModal('${compId}')">إدارة الفروع</button>
                        </div>
                    </div>
                `;
            }
        });

        function openBranchModal(compId) {
            let clientSettings = currentClientsData[compId]?.settings || {};
            let clientName = clientSettings.profile?.name || compId;
            document.getElementById('modal-client-name').innerText = clientName;
            document.getElementById('modal-client-id').value = compId;
            renderClientBranches(compId);
            document.getElementById('branch-modal').style.display = 'flex';
        }

        function renderClientBranches(compId) {
            let branches = currentClientsData[compId]?.settings?.branches || [];
            let listContainer = document.getElementById('client-branches-list');
            listContainer.innerHTML = '';
            if(branches.length === 0) {
                listContainer.innerHTML = '<div style="text-align:center; color:#7f8c8d; font-size:13px; padding:10px;">لا توجد فروع لهذا العميل حتى الآن.</div>';
                return;
            }
            branches.forEach((b, idx) => {
                if(!b) return;
                listContainer.innerHTML += `
                    <div class="branch-item">
                        <div class="branch-item-info">
                            <b>${b.name}</b>
                            <span>هاتف: ${b.phone} | الرمز السري: ${b.pass}</span>
                        </div>
                        <button class="btn-small" style="background:#e74c3c;" onclick="deleteBranchFromClient('${compId}', ${idx})">حذف ❌</button>
                    </div>
                `;
            });
        }

        function addBranchToClient() {
            let compId = document.getElementById('modal-client-id').value;
            let n = document.getElementById('new-b-name').value.trim();
            let p = document.getElementById('new-b-phone').value.trim();
            let pw = document.getElementById('new-b-pass').value.trim();

            if(!n || !p || !pw) return alert("الرجاء إكمال بيانات الفرع!");

            let branches = currentClientsData[compId]?.settings?.branches || [];
            branches.push({ id: Date.now(), name: n, phone: p, pass: pw });

            dbCloud.ref(SAAS_PATH + compId + '/settings/branches').set(branches).then(() => {
                document.getElementById('new-b-name').value = ''; document.getElementById('new-b-phone').value = ''; document.getElementById('new-b-pass').value = '';
                setTimeout(() => renderClientBranches(compId), 500); 
            });
        }

        function deleteBranchFromClient(compId, idx) {
            if(confirm("هل أنت متأكد من حذف هذا الفرع نهائياً؟")) {
                let branches = currentClientsData[compId]?.settings?.branches || [];
                branches.splice(idx, 1);
                dbCloud.ref(SAAS_PATH + compId + '/settings/branches').set(branches).then(() => {
                    setTimeout(() => renderClientBranches(compId), 500);
                });
            }
        }
    </script>
</body>
</html>
